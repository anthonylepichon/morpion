<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Jeu du morpion</title>

   <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="container" class="container">

      <div class="case" id="case-2"></div>
      <div class="case" id="case-3"></div>

      <div class="case" id="case-5"></div>
      <div class="case" id="case-6"></div>

  </div>
  <script src="script.js"></script>
</body>
</html>
